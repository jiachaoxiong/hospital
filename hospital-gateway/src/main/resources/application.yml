server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: hospital-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:HospRedis@2026}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      routes:
        - id: auth
          uri: lb://hospital-auth
          predicates:
            - Path=/auth/**
        - id: hospital
          uri: lb://hospital-hospital
          predicates:
            - Path=/hospital/**,/department/**,/doctor/**
        - id: booking
          uri: lb://hospital-booking
          predicates:
            - Path=/booking/**,/schedule/**
        - id: order
          uri: lb://hospital-order
          predicates:
            - Path=/order/**
        - id: payment
          uri: lb://hospital-payment
          predicates:
            - Path=/payment/**
        - id: notify
          uri: lb://hospital-notify
          predicates:
            - Path=/notify/**,/sms/**

jwt:
  # 生产环境必须通过环境变量注入强密钥：openssl rand -base64 32
  secret: ${JWT_SECRET}
